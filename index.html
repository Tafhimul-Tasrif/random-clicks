<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css" integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
<style>
* {
  box-sizing: border-box;
  font-family: "Iosevka Charon", monospace;
  padding: 10px;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.header {
  text-align: center;
  padding: 32px;
}
.header h1{
  font-family: "Playwrite GB J", cursive;
  text-align: center;
  font-size: 30px;
}
.header h2{
      text-align: center;
      font-family: "Playwrite GB J", cursive;
      font-size: 15px;
    }
p{
  font-size: 20px;
  text-align: center;
}
.row {
  display: -ms-flexbox; /* IE 10 */
  display: flex;
  -ms-flex-wrap: wrap; /* IE 10 */
  flex-wrap: wrap;
  padding: 0 4px;
}

.column {
  -ms-flex: 50%; /* IE 10 */
  flex: 50%;
  padding: 0 4px;
}

.column img {
  margin-top: 8px;
  vertical-align: middle;
  cursor: pointer; 
  transition: 0.3s; 
}

.column img:hover {
  opacity: 0.8; 
}

.btn {
  margin: 0px;
  border: 1px solid black;
  outline: none;
  padding: 5px;
  cursor: pointer;
  font-size: 18px;
  background-color: transparent;
}

.btn:hover {
  background-color: #ddd;
}

.btn.active {
  background-color: #666;
  color: white;
}

.modal {
  display: none; 
  position: fixed; 
  z-index: 999; 
  padding-top: 50px; 
  left: 0;
  top: 0;
  width: 100%; 
  height: 100%; 
  overflow: auto; 
  background-color: rgba(0,0,0,0.9); 
}

.modal-content {
  margin: auto;
  display: block;
  max-width: 90%;
  max-height: 75vh;
  object-fit: contain; 
  padding: 0; 
}

#caption {
  margin: auto;
  display: block;
  width: 80%;
  text-align: center;
  color: #ccc;
  padding: 15px 0;
  font-size: 18px;
}

.close {
  position: absolute;
  top: 15px;
  right: 35px;
  color: #f1f1f1;
  font-size: 40px;
  font-weight: bold;
  transition: 0.3s;
  cursor: pointer;
  padding: 0; 
}

.close:hover,
.close:focus {
  color: #bbb;
  text-decoration: none;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header" id="myHeader">
  <h1>Clicks</h1>
  <h2>by Tasrif</h2>
  <p>Moments captured through my phone lens. Just everyday life, framed.</p>
  <div class="btn-div">
    <button class="btn" style="border-radius: 25px 0px 0px 25px;" onclick="one()"><i class="bi bi-square-fill"></i></button>
    <button class="btn active" onclick="two()"><i class="bi bi-grid-fill"></i></button>
    <button class="btn" style="border-radius: 0px 25px 25px 0px;" onclick="four()"><i class="bi bi-grid-3x3-gap-fill"></i></button>
  </div>
</div>

<!-- Photo Grid -->
<div class="row"> 
  <div class="column">
    <!-- Add data-date="..." to each image -->
    <img src="img/9.jpg" style="width:100%" data-date="October 24, 2023">
    <img src="img/8.jpg" style="width:100%" data-date="November 12, 2023">
  </div>
  <div class="column">
    <img src="img/10.jpg" style="width:100%" data-date="December 5, 2023">
    <img src="img/6.jpg" style="width:100%" data-date="January 1, 2024">
    <img src="img/5.jpg" style="width:100%" data-date="February 14, 2024">
  </div>  
  <div class="column">
    <img src="img/4.jpg" style="width:100%" data-date="March 10, 2024">
    <img src="img/3.jpg" style="width:100%" data-date="April 22, 2024">
    <img src="img/7.jpg" style="width:100%" data-date="May 5, 2024">
  </div>
  <div class="column">
    <img src="img/0.jpg" style="width:100%" data-date="June 1, 2024">
    <img src="img/1.jpg" style="width:100%" data-date="June 15, 2024">    
    <img src="img/2.jpg" style="width:100%" data-date="July 4, 2024">
  </div>
</div>

<!-- Modal HTML -->
<div id="imageModal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <img class="modal-content" id="modalImg">
  <!-- This is now completely empty by default -->
  <div id="caption"></div> 
</div>

<script>
var elements = document.getElementsByClassName("column");
var i;

function one() {
  for (i = 0; i < elements.length; i++) {
    elements[i].style.msFlex = "100%";  
    elements[i].style.flex = "100%";
  }
}

function two() {
  for (i = 0; i < elements.length; i++) {
    elements[i].style.msFlex = "50%";  
    elements[i].style.flex = "50%";
  }
}

function four() {
  for (i = 0; i < elements.length; i++) {
    elements[i].style.msFlex = "25%";  
    elements[i].style.flex = "25%";
  }
}

var header = document.getElementById("myHeader");
var btns = header.getElementsByClassName("btn");
for (var i = 0; i < btns.length; i++) {
  btns[i].addEventListener("click", function() {
    var current = document.getElementsByClassName("active");
    current[0].className = current[0].className.replace(" active", "");
    this.className += " active";
  });
}

// Modal Script
var modal = document.getElementById("imageModal");
var modalImg = document.getElementById("modalImg");
var captionText = document.getElementById("caption"); // Grab the caption div

var gridImages = document.querySelectorAll(".column img");

gridImages.forEach(function(img) {
  img.onclick = function() {
    modal.style.display = "block";
    modalImg.src = this.src; 
    // Pull the specific date from the clicked image's data-date attribute
    captionText.innerHTML = this.getAttribute("data-date"); 
  }
});

function closeModal() {
  modal.style.display = "none";
}

window.onclick = function(event) {
  if (event.target == modal) {
    modal.style.display = "none";
  }
}
</script>

</body>
</html>
